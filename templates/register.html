<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — Café Atlas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root{--cream:#f5f0e8;--espresso:#2b1a0e;--roast:#5c3317;--caramel:#c0854a;--foam:#faf7f2;--muted-txt:#8a7060;}
    body{background:var(--cream);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;}
    .navbar{background:var(--espresso)!important;}
    .navbar-brand{font-family:'Playfair Display',serif;font-size:1.4rem;color:#fff!important;}
    .navbar-brand span{color:var(--caramel);}
    .auth-wrapper{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;}
    .auth-card{background:var(--foam);border-radius:20px;box-shadow:0 8px 40px rgba(43,26,14,.12);padding:40px;width:100%;max-width:460px;}
    .auth-title{font-family:'Playfair Display',serif;font-size:1.8rem;color:var(--espresso);margin-bottom:6px;}
    .auth-sub{color:var(--muted-txt);font-size:.9rem;margin-bottom:28px;}
    .form-label{font-size:.8rem;text-transform:uppercase;letter-spacing:.04em;color:var(--muted-txt);font-weight:500;}
    .form-control{background:var(--cream)!important;border-color:#ddd5c8!important;color:var(--espresso)!important;padding:12px 14px;}
    .form-control:focus{border-color:var(--caramel)!important;box-shadow:0 0 0 3px rgba(192,133,74,.15)!important;}
    .btn-espresso{background:var(--espresso);color:#fff;border:none;padding:12px;border-radius:8px;font-weight:500;width:100%;font-size:1rem;transition:background .2s;}
    .btn-espresso:hover{background:var(--roast);color:#fff;}
    .auth-link{color:var(--caramel);text-decoration:none;font-weight:500;}
    .auth-link:hover{color:var(--roast);}
    .error-box{background:#fdecea;border:1px solid #f5c6c6;border-radius:8px;padding:12px 16px;font-size:.88rem;color:#9b3535;display:none;margin-bottom:16px;}
    .success-box{background:#e8f5ee;border:1px solid #b3d9c3;border-radius:8px;padding:12px 16px;font-size:.88rem;color:#2d6a4f;display:none;margin-bottom:16px;}
    .strength-bar{height:4px;border-radius:2px;margin-top:6px;transition:all .3s;}
  </style>
</head>
<body>
<nav class="navbar py-2 px-4"><a class="navbar-brand" href="/">☕ <span>Café</span>Atlas</a></nav>

<div class="auth-wrapper">
  <div class="auth-card">
    <h2 class="auth-title">Create your account</h2>
    <p class="auth-sub">Join Café Atlas and start discovering great spots</p>

    <div class="error-box"   id="error-box"><i class="bi bi-exclamation-circle me-2"></i><span id="error-msg"></span></div>
    <div class="success-box" id="success-box"><i class="bi bi-envelope-check me-2"></i><span id="success-msg"></span></div>

    <div id="register-form">
      <div class="mb-3">
        <label class="form-label">Full Name</label>
        <input id="name" type="text" class="form-control" placeholder="Your name"/>
      </div>
      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <input id="email" type="email" class="form-control" placeholder="you@example.com"/>
      </div>
      <div class="mb-4">
        <label class="form-label">Password</label>
        <input id="password" type="password" class="form-control" placeholder="Min. 8 characters" oninput="checkStrength(this.value)"/>
        <div class="strength-bar mt-2" id="strength-bar" style="width:0%;background:#ddd"></div>
        <small class="text-muted" id="strength-label"></small>
      </div>
      <button class="btn-espresso btn mb-3" onclick="handleRegister()" id="reg-btn">
        <i class="bi bi-person-plus me-2"></i>Create Account
      </button>
      <p class="text-center text-muted" style="font-size:.88rem">
        Already have an account? <a href="/login" class="auth-link">Sign in</a>
      </p>
    </div>
  </div>
</div>

<script>
  function checkStrength(pw) {
    const bar   = document.getElementById('strength-bar');
    const label = document.getElementById('strength-label');
    if (!pw) { bar.style.width='0%'; label.textContent=''; return; }
    let score = 0;
    if (pw.length >= 8)            score++;
    if (/[A-Z]/.test(pw))          score++;
    if (/[0-9]/.test(pw))          score++;
    if (/[^A-Za-z0-9]/.test(pw))   score++;
    const map = {
      1: ['25%','#e74c3c','Weak'],
      2: ['50%','#e67e22','Fair'],
      3: ['75%','#f1c40f','Good'],
      4: ['100%','#2ecc71','Strong'],
    };
    const [w,c,t] = map[score] || ['0%','#ddd',''];
    bar.style.width=w; bar.style.background=c; label.textContent=t;
    label.style.color=c;
  }

  async function handleRegister() {
    const name     = document.getElementById('name').value.trim();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('reg-btn');

    if (!name || !email || !password) { showError('All fields are required.'); return; }
    if (password.length < 8)          { showError('Password must be at least 8 characters.'); return; }

    btn.disabled=true; btn.innerHTML='<span class="spinner-border spinner-border-sm me-2"></span>Creating account…';

    try {
      const res  = await fetch('/auth/register', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({name,email,password}),
      });
      const data = await res.json();

      if (!res.ok) { showError(data.error); resetBtn(); return; }

      // Hide form, show success
      document.getElementById('register-form').style.display='none';
      showSuccess(data.success + ' Check your inbox and click the confirmation link.');

    } catch (err) {
      showError('Could not connect to server.'); resetBtn();
    }
  }

  function showError(msg) {
    document.getElementById('error-msg').textContent=msg;
    document.getElementById('error-box').style.display='block';
    document.getElementById('success-box').style.display='none';
  }
  function showSuccess(msg) {
    document.getElementById('success-msg').textContent=msg;
    document.getElementById('success-box').style.display='block';
    document.getElementById('error-box').style.display='none';
  }
  function resetBtn() {
    const b=document.getElementById('reg-btn');
    b.disabled=false; b.innerHTML='<i class="bi bi-person-plus me-2"></i>Create Account';
  }
</script>
</body>
</html>
