<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><title>Email Confirmation — Café Atlas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root{--cream:#f5f0e8;--espresso:#2b1a0e;--caramel:#c0854a;--foam:#faf7f2;}
    body{background:var(--cream);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;}
    .result-card{background:var(--foam);border-radius:20px;box-shadow:0 8px 40px rgba(43,26,14,.12);padding:48px 40px;text-align:center;max-width:440px;width:90%;}
    .result-icon{font-size:3.5rem;margin-bottom:20px;}
    .result-title{font-family:'Playfair Display',serif;font-size:1.8rem;color:var(--espresso);margin-bottom:12px;}
    .btn-espresso{background:var(--espresso);color:#fff;border:none;padding:12px 28px;border-radius:8px;font-weight:500;text-decoration:none;display:inline-block;margin-top:20px;}
    .btn-espresso:hover{background:#5c3317;color:#fff;}
  
    @media (max-width: 480px) {
      body { overflow-x: hidden; }
      .auth-card { padding: 28px 20px !important; margin: 0 8px; }
      .auth-title { font-size: 1.5rem !important; }
      .result-card { padding: 32px 24px !important; }
    }
      </style>
</head>
<body>
  <div class="result-card">
    {% if success %}
      <div class="result-icon">✅</div>
      <h2 class="result-title">You're confirmed!</h2>
      <p class="text-muted">{{ message }}</p>
      <a href="/login" class="btn-espresso"><i class="bi bi-box-arrow-in-right me-2"></i>Sign In Now</a>
    {% else %}
      <div class="result-icon">❌</div>
      <h2 class="result-title">Confirmation Failed</h2>
      <p class="text-muted">{{ message }}</p>
      <a href="/register" class="btn-espresso"><i class="bi bi-arrow-repeat me-2"></i>Try Again</a>
    {% endif %}
  </div>
</body>
</html>
